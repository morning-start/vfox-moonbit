name: CI

on:
    push:
        branches: [main]
        tags: ["v*"]
    pull_request:
        branches: [main]
    workflow_dispatch:

jobs:
    ci:
        strategy:
            matrix:
                os: [ubuntu-latest, macos-latest]
        runs-on: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@v4
            - uses: jdx/mise-action@v2
            - run: mise run ci
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    release:
        if: startsWith(github.ref, 'refs/tags/v')
        needs: [ci]
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v4

            - name: Generate manifest.json
              run: |
                  VERSION="${GITHUB_REF_NAME#v}"
                  cat > manifest.json <<EOF
                  {
                    "name": "moonbit",
                    "version": "${VERSION}",
                    "description": "MoonBit 编程语言工具链。MoonBit 是一个用于云和边缘计算的端到端编程语言工具链，使用 WebAssembly。",
                    "homepage": "https://github.com/${{ github.repository }}",
                    "license": "MIT",
                    "minRuntimeVersion": "0.2.0",
                    "downloadUrl": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/moonbit-${VERSION}.zip",
                    "notes": [
                      "版本 ${VERSION} 发布"
                    ]
                  }
                  EOF

            - name: Package plugin
              run: |
                  VERSION="${GITHUB_REF_NAME#v}"
                  git archive --format=zip --output="moonbit-${VERSION}.zip" "${{ github.ref_name }}" \
                    --add-file=manifest.json

            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  name: ${{ github.ref_name }}
                  draft: false
                  prerelease: false
                  generate_release_notes: true
                  files: |
                      moonbit-*.zip
                      manifest.json
